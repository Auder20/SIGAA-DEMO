<!DOCTYPE html>
{% load static %}
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SIGAA - Autenticación{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #1e40af;
        --primary-dark: #1e3a8a;
        --primary-light: #3b82f6;
        --secondary-color: #6c757d;
        --light-color: #f3f4f6;
        --dark-color: #1f2937;
        --blue-gradient: linear-gradient(135deg, #1e40af, #3b82f6);
        --blue-light: #eff6ff;
        --shadow-sm: 0 2px 4px rgba(0,0,0,.08);
        --shadow-md: 0 4px 8px rgba(0,0,0,.1);
        --shadow-lg: 0 8px 20px rgba(0,0,0,.15);
      }
      
      body {
        background: var(--blue-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        position: relative;
      }
      
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,165.3C384,171,480,149,576,128C672,107,768,85,864,90.7C960,96,1056,128,1152,138.7C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
        background-size: cover;
      }
      
      .auth-container {
        max-width: 450px;
        width: 100%;
        margin: 0 auto;
        padding: 2.5rem;
        background: white;
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
        position: relative;
        z-index: 1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
      }
      
      .logo-container {
        text-align: center;
        margin-bottom: 2rem;
      }
      
      .logo-container img {
        max-width: 120px;
        height: auto;
        margin-bottom: 1rem;
        filter: drop-shadow(0 4px 8px rgba(30, 64, 175, 0.2));
      }
      
      .logo-container h3 {
        color: var(--primary-color);
        font-weight: 700;
        font-size: 1.5rem;
        margin: 0;
      }
      
      .btn-primary {
        background: var(--blue-gradient);
        border: none;
        border-radius: 10px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
      }
      
      .btn-primary:hover {
        background: linear-gradient(135deg, #1e3a8a, #1e40af);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
      }
      
      .btn-outline-secondary {
        border-radius: 10px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .btn-outline-secondary:hover {
        background: var(--primary-color);
        border-color: var(--primary-color);
        transform: translateY(-2px);
      }
      
      .form-control, .form-select {
        border-radius: 10px;
        border: 2px solid #e5e7eb;
        padding: 0.75rem 1rem;
        transition: all 0.3s ease;
      }
      
      .form-control:focus, .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(30, 64, 175, 0.25);
        background-color: rgba(30, 64, 175, 0.05);
      }
      
      .input-group-text {
        background: var(--blue-light);
        border: 2px solid #e5e7eb;
        border-radius: 10px 0 0 10px;
        color: var(--primary-color);
      }
      
      .input-group .form-control {
        border-radius: 0 10px 10px 0;
      }
      
      .form-label {
        font-weight: 600;
        color: var(--dark-color);
        margin-bottom: 0.5rem;
      }
      
      .alert {
        border-radius: 10px;
        border: none;
        box-shadow: var(--shadow-sm);
      }
      
      .text-decoration-none {
        color: var(--primary-color);
        font-weight: 600;
        transition: color 0.3s ease;
      }
      
      .text-decoration-none:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
      
      h4 {
        color: var(--dark-color);
        font-weight: 700;
        margin-bottom: 1.5rem;
      }
      
      .invalid-feedback {
        font-weight: 500;
      }
      
      .form-text {
        font-size: 0.875rem;
        color: var(--secondary-color);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="auth-container">
            <div class="logo-container">
              <img
                src="{% static 'img/logotipo1.png' %}"
                alt="SIGAA Logo"
                class="img-fluid"
              />
              <h3 class="mt-3">Sistema de Gestión de Afiliados</h3>
            </div>

            <!-- Mensajes -->
            {% if messages %} {% for message in messages %}
            <div
              class="alert alert-{{ message.tags }} alert-dismissible fade show"
              role="alert"
            >
              {{ message }}
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Close"
              ></button>
            </div>
            {% endfor %} {% endif %}

            <!-- Contenido específico de cada página -->
            {% block content %}{% endblock %}

            <!-- Enlaces adicionales -->
            <div class="text-center mt-4">
              {% block extra_links %}{% endblock %}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS y dependencias -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
